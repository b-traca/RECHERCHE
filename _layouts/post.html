---
layout: default
---

<article class="post">
  <p class="post-meta">{{ page.date | date: "%d.%m.%Y" }}</p>
  <h1>{{ page.title }}</h1>

  {% if page.categories %}
    <p class="categories">
      {% for category in page.categories %}
        <span>{{ category }}</span>
      {% endfor %}
    </p>
  {% endif %}

  <div class="post-content">
    {{ content }}
  </div>
</article>
